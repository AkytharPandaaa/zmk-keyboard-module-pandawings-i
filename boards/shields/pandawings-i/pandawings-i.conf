## Uncomment for more battery life (source: YouTube d5aiYISOIa0)
#CONFIG_ZMK_IDLE_TIMEOUT=20000 
#CONFIG_ZMK_SLEEP=Y
#CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
## Hidden Zephyr options for more battery life
## Zephyr Docs: https://docs.zephyrproject.org/4.1.0/kconfig.html#!%5ECONFIG_BT_PERIPHERAL_PREF
#CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
#CONFIG_BT_PERIPHERAL_PREF_MIN_INT=48
#CONFIG_BT_PERIPHERAL_PREF_MAX_INT=80
#CONFIG_BT_PERIPHERAL_PREF_LATENCY=4

## Uncomment if you have problems with the bluetooth connection
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

## Uncomment the following lines to enable the PandaWings I RGB Underglow
#CONFIG_ZMK_RGB_UNDERGLOW=y
#CONFIG_WS2812_STRIP=y

## Uncomment the following line to enable the Corne OLED Display
#CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_EXT_POWER=y
#CONFIG_ZMK_WPM=y


