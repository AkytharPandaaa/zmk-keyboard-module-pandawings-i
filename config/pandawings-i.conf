CONFIG_ZMK_KEYBOARD_NAME="PandaWings I"
CONFIG_ZMK_SETTINGS_RESET_ON_START=n

CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y
CONFIG_ZMK_HID_CONSUMER_REPORT_SIZE=6
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=90

CONFIG_USB=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=y

CONFIG_BT=y
CONFIG_BT_BAS=y
CONFIG_ZMK_BLE=y

CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# chose 1 when using without dongle, 2 when using a dongle
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Uncomment the following lines to enable the PandaWings I RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
#CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_EXT_POWER=y
#CONFIG_ZMK_WPM=y
